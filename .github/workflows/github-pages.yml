# Only runs when you manually start it (avoids surprise broken GitHub Pages on every push).
# Repo → Settings → Pages → Source: GitHub Actions.
# For https://user.github.io/<repo>/ set BASE_PATH below to /your-repo-name
name: GitHub Pages (static export)

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          STATIC_EXPORT: '1'
          BASE_PATH: ''
      - uses: actions/upload-pages-artifact@v3
        with:
          path: out
      - id: deploy
        uses: actions/deploy-pages@v4
